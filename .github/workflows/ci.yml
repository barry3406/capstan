name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: Build & Test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build runtime packages
        run: |
          for pkg in core router db auth agent react dev cli create-capstan; do
            echo "--- Building packages/$pkg ---"
            npm run build --workspace "packages/$pkg" 2>&1 || { echo "::error::Build failed for packages/$pkg"; exit 1; }
          done

      - name: Run tests
        run: npm run test:new
