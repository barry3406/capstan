name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: Build & Test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build --workspace packages/core

      - name: Build router
        run: npm run build --workspace packages/router

      - name: Build db
        run: npm run build --workspace packages/db

      - name: Build auth
        run: npm run build --workspace packages/auth

      - name: Build agent
        run: npm run build --workspace packages/agent

      - name: Build react
        run: npm run build --workspace packages/react

      - name: Build dev
        run: npm run build --workspace packages/dev

      - name: Build cli
        run: npm run build --workspace packages/cli

      - name: Build create-capstan-app
        run: npm run build --workspace packages/create-capstan

      - name: Run tests
        run: npm run test:new
