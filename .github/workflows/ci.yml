name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"
      - run: npm install
      - name: Build all packages
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist/

  test-bun:
    needs: build
    runs-on: ubuntu-latest
    name: Test (Bun)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"
      - run: npm install
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages/
      - name: Run tests (Bun)
        run: bun test tests/unit/ tests/integration/

  test-node:
    needs: build
    runs-on: ubuntu-latest
    name: Test (Node.js 22)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"
      - run: npm install
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages/
      - name: Run tests (Bun on Node build)
        run: npm run test:new
